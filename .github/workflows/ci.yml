name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BiliTool.Vn.sln

      - name: Build
        run: dotnet build BiliTool.Vn.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test BiliTool.Vn.sln --no-build --configuration Release

      - name: Vulnerability scan
        run: dotnet list ${{ github.workspace }}/BiliTool.Vn.sln package --vulnerable --include-transitive
