events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Trust Cloudflare IPs để lấy IP thực của người dùng ──────
    # IPv4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Server: HTTP only (Cloudflare handle SSL) ─────────────────
    # Cloudflare kết nối đến origin qua HTTP port 80.
    # SSL với visitor do Cloudflare đảm nhận (SSL mode: Full hoặc Flexible).
    server {
        listen 80;
        server_name bilitool.vn www.bilitool.vn;

        # Security headers are emitted by ASP.NET Core to avoid duplicate/conflicting values.

        # ── Blazor SignalR WebSocket ──────────────────────────────
        location /_blazor {
            proxy_pass http://bilitool-web:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ── Static files ──────────────────────────────────────────
        location ~* \.(css|js|ico|png|jpg|svg|woff|woff2|ttf|webp)$ {
            proxy_pass http://bilitool-web:8080;
            add_header Cache-Control "public, max-age=2592000, immutable";
            proxy_set_header Host $host;
        }

        # ── Tất cả request còn lại → Blazor ──────────────────────
        location / {
            proxy_pass http://bilitool-web:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
