version: '3.8'

services:
  # ── Ứng dụng BiliTool.Vn (Blazor Server) ──────────────────
  bilitool-web:
    image: bilitool-vn:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bilitool-vn-app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=bilitool_vn;Username=bilitool;Password=bilitool_secure_2024
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bilitool-vn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bilitool_vn
      POSTGRES_USER: bilitool
      POSTGRES_PASSWORD: bilitool_secure_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilitool -d bilitool_vn"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
